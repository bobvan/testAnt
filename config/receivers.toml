# Hardware configuration for the two u-blox F9T receivers.
# This file describes stable physical facts — it changes only if the
# hardware itself changes.  Commit it; do not copy it per-machine.
#
# Receiver identity is by physical position (TOP / BOT), not by role.
# Stable /dev symlinks are provided by:
#   config/99-ublox-gnss.rules  →  /etc/udev/rules.d/99-ublox-gnss.rules
#
# Per-run test assignments (which antenna/mount is on which receiver)
# live in config/run.toml (gitignored).
#
# Stop gpsd before running any scripts:
#   sudo systemctl stop gpsd gpsd.socket

[receiver.TOP]
port  = "/dev/gnss-top"
baud  = 115200
hw    = "ZED-F9T-20B"
fw    = "TIM 2.25"
note  = "no GLONASS (hardware limitation of -20B variant)"

[receiver.BOT]
port  = "/dev/gnss-bot"
baud  = 115200
hw    = "ZED-F9T"
fw    = "TIM 2.20"
note  = "has GLONASS"

[ticc]
port  = "/dev/ticc"
baud  = 115200
note  = "TAPR TICC; chA = TOP PPS, chB = BOT PPS"
