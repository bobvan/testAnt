# Receiver configuration for the two u-blox F9T units.
# Copy to config/local.toml and adjust port paths before running.
# local.toml is gitignored so machine-specific paths stay local.
#
# Both F9Ts enumerate as CDC ACM devices (/dev/ttyACM*).
# Stable symlinks are provided by /etc/udev/rules.d/99-ublox-gnss.rules,
# which matches each receiver by physical USB port (ID_PATH) so that
# /dev/gnss-ref and /dev/gnss-dut survive reboots and replugs.
#
# gpsd is configured to hold ttyACM0. Stop it before running our scripts:
#   sudo systemctl stop gpsd gpsd.socket

[receiver.A]
port   = "/dev/gnss-ref"
baud   = 115200
label  = "REF"          # role: reference antenna

[receiver.B]
port   = "/dev/gnss-dut"
baud   = 115200
label  = "DUT"          # role: antenna under test
